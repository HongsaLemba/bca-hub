<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header>
    <nav class="navbar">
        <div class="logo">
            <img src="dbrg logo.gif" alt="University Logo">
        </div>
    </nav>
</header>

<!-- ===== Banner Section ===== -->
<div class="banner">
    <img src="Centre-for-Distance-and-Open-Education-banner.jpg" alt="">
    <div class="banner-text">
        <h1>Photo Gallery</h1>
    </div>
</div>

<!-- ===== Gallery Section ===== -->
<section class="gallery-section">
    <div class="gallery-grid">
        <div class="item tall"><img src="gallery (1).jpg" alt=""></div>
        <div class="item"><img src="gallery (2).jpg" alt=""></div>
        <div class="item wide"><img src="gallery (3).jpg" alt=""></div>
        <div class="item"><img src="gallery (4).jpg" alt=""></div>
        <div class="item"><img src="gallery (5).jpg" alt=""></div>
        <div class="item tall"><img src="gallery (6).jpg" alt=""></div>
        <div class="item wide"><img src="gallery (7).jpg" alt=""></div>
        <div class="item"><img src="gallery (8).jpg" alt=""></div>
    </div>
</section>
 <footer>
        <p>© 2026 BCA Distance Notes | Created by Ajoy & Jahangir</p>
    </footer>
</body>
</html>
